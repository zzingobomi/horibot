# Horibot robot instance registry.
# multi_robot_architecture.md §4.3 의 single source of truth.
# 각 entry 의 key 가 robot_id (instance identifier).
# Paths (urdf/calibration/...) 는 RobotRegistry 가 robot_type / robot_id 로 자동 조립
# — 매 entry 마다 적지 않음 (§4.3).

robots:
  omx_f_0:
    type: omx_f
    enabled: true
    capabilities: [move, calibrate, scan]   # D405 보유 → scan 가능. SO-101 도착 시 USB cam 으로 바뀌면 [move, calibrate] 로 변경.
    motor_backend: dynamixel
    kinematics_backend: pybullet
    camera_backend: realsense    # Phase 2 (distributed_topology.md §1): omx_f → opencv (UVC)
    # Hand-Eye 캘 추천 자세 전략. 5DOF (wrist yaw 없음) 라 임의 R IK 못 풀림 →
    # joint space perturbation (FK only). geometry (6DOF anchor + IK) 는 SO-101 에서.
    pose_recommend_strategy: joint_perturbation
    base_pose:                   # World frame 의 robot base 위치 (m, x/y/z).
      x: 0.0
      y: 0.0
      z: 0.0
      yaw_deg: 0.0

  # multi_robot_phase2_frontend.md §2 프로토타입 자리 — 가짜 SO101 entry.
  # type=omx_f 로 URDF/mesh 복제 (시각화만이라 충분). 실 hardware 도착 시
  # type=so101_6dof 로 교체 + so101_0 instance 폴더의 calibration/poses 갱신.
  # enabled=false — backend 가 motor/camera 노드 부팅 시도 안 함 (frontend 시각화 only).
  so101_0:
    type: omx_f
    enabled: false
    # viz-only placeholder 라도 sidebar 에서 navigate 가능해야 multi-robot
    # 시각화 (focus 전환 → others dim) 검증됨. enabled=false 라 backend 가
    # 실제 motor/camera 노드는 안 띄움 → panel 들은 빈 데이터로 보임 (의도된 동작).
    # 실 hardware 도착 시 enabled=true + scan 추가 (D405 양도).
    capabilities: [move, calibrate]
    motor_backend: dynamixel
    kinematics_backend: pybullet
    camera_backend: realsense
    # SO-101 6DOF 가정 (실 hardware 도착 시) — wrist yaw 있어 임의 R 만들 수 있음.
    pose_recommend_strategy: geometry
    base_pose:
      x: 0.4
      y: 0.0
      z: 0.0
      yaw_deg: 0.0

# Phase 2+ — Cooperation 영역 (so101 도착 시 활성화).
