# 실행:
#   uv sync --no-default-groups --group pi-motor
#   uv run --no-sync python -m apps.main --host pi_motor

driver_mode: real

zenoh:
  mode: peer
  scouting:
    multicast:
      enabled: true

modules:
  - name: motor
    robots: [so101_6dof_0]
  - name: motion # MotorDriver 와 동거 — 100Hz 명령 network 안 넘게 + IK RTT 0
    robots: [so101_6dof_0]
