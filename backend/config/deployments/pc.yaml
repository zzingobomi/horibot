# 실행:
#   uv sync
#   uv run --no-sync python -m apps.main --host pc

driver_mode: real

rdb_uri: "sqlite:///horibot.db"
object_uri: "storage/blobs"

dev_console: true

zenoh:
  mode: peer
  scouting:
    multicast:
      enabled: true

modules:
  - name: camera_decoded
    robots: [so101_6dof_0, omx_f_0]
  - name: motion_preview
  - name: calibration
  - name: scene3d
  - name: scan
  - name: waypoint
  # shared_config (2026-07-22 신설) — 공유 config owner (workcell ROI SSOT:
  # instance.yaml R/W + Mirror snapshot). detector 앞 = 부팅 initial snapshot
  # 즉시 수렴 (늦어도 liveliness 로 자동 수렴 — 순서는 최적화일 뿐).
  - name: shared_config
  - name: detector
  - name: llm
  - name: pick_and_place
  # world_scan (2026-07-21 신설) — 3D 배경 메시 전용 스캔 task (pick 편승 분리).
  - name: world_scan
  # TODO(handover): pick_and_place 실물 검증 완료 후 주석 해제 (2026-07-17 신설
  # — 실물 미검증 task. omx pick(open-loop)/수취/충돌 margin 전부 실물 특성화
  # 필요 — modules/tasks/handover/steps.py docstring 의 가정 ①~③ 먼저 확인).
  # - name: handover
  - name: bridge
  - name: logcollector
  - name: host_monitor
