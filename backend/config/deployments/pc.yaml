# 실행:
#   uv sync
#   uv run --no-sync python -m apps.main --host pc

driver_mode: real

rdb_uri: "sqlite:///horibot.db"
object_uri: "storage/blobs"

# 개발용 콘솔 (GET /dev) — 집 dev 배포에서 서비스 두드리기.
dev_console: true

zenoh:
  mode: peer
  scouting:
    multicast:
      enabled: true

modules:
  - name: camera_decoded
    robots: [so101_6dof_0, omx_f_0]
  - name: calibration
  - name: scene3d
  - name: scan
  - name: waypoint
  - name: detector
  - name: llm
  - name: task
  - name: pick_and_place
  - name: bridge
