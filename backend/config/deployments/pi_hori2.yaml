# 실행:
#   # pyrealsense2 는 aarch64 PyPI wheel 없음 → 사전 소스 빌드 필요 (docs/pyrealsense2-build-guide.md)
#   uv sync --no-default-groups --group pi-hori2 --no-install-package pyrealsense2
#   uv pip install ~/pyrealsense2-2.55.1-cp311-cp311-linux_aarch64.whl
#   uv run --no-sync python -m apps.main --host pi_hori2

driver_mode: real

zenoh:
  mode: peer
  scouting:
    multicast:
      enabled: true

modules:
  - name: camera
    robots: [so101_6dof_0]
  - name: host_monitor   # 이 host CPU/mem 발행 (PC bridge 가 fan-in)
