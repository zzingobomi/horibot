# Alembic config.
# Runtime: StorageRegistry passes a live engine via config.attributes['connection']
#          (sqlalchemy.url is ignored when a connection attribute is present).
# CLI standalone: `alembic revision --autogenerate -m "..."` uses a scratch SQLite
#          file. env.py rewrites sqlalchemy.url to an absolute path under
#          BACKEND_ROOT, so cwd doesn't matter. The scratch DB is gitignored.
# ASCII-only to avoid Windows cp949 read errors in configparser.
[alembic]
script_location = alembic
# YYYY_MM_DD_HHMM-<rev>_<slug>.py -- chronological sort + Alembic hash + slug.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
prepend_sys_path = .
# Placeholder -- env.py overrides with an absolute path. Keep a valid URL so
# `engine_from_config` doesn't choke if env.py logic ever changes.
sqlalchemy.url = sqlite:///.alembic_autogen.db

# Logging sections intentionally omitted. Logging is owned by the host:
# - Programmatic (StorageRegistry boot)  -> main.py logging.basicConfig is SSOT
# - CLI standalone (alembic revision/upgrade) -> Python default (Alembic command
#   output prints directly; INFO logs surface via root logger if the user wants).
# Putting [loggers]/[handlers] here would clobber the host's config when env.py
# calls fileConfig (default disable_existing_loggers=True + root level=WARNING).
