# 분산 sim — 카메라 Pi 역할 (mock_camera).
# scene3d_decoupling.md §13.1 분산 sim 자리.
#
# 실행:
#   uv run python main.py --host pi_camera_sim
host_name: pi_camera_sim

zenoh:
  mode: peer
  # LAN 격리 — host_pc_sim 의 listen endpoint 로 connect. multicast OFF.
  scouting:
    multicast:
      enabled: false
  listen: []
  connect: ["tcp/127.0.0.1:7447"]

robots:
  - so101_6dof_0

device_nodes:
  - mock_camera

# application 노드 없음 — Scene3DNode 자리는 PC sim 자리.
application_nodes: []

bridge:
  enabled: false
