# 실행:
#   uv sync
#   uv run --no-sync python -m apps.main --host mock

driver_mode: mock

# mock = 하드웨어 없는 UX/wire 검증 — in-memory DB (재시작 시 휘발). 실 파일 DB 는 pc.yaml.
rdb_uri: "sqlite:///:memory:"
object_uri: ".calib_blobs_mock"  # ephemeral (gitignore) — capture blob 검증용

zenoh:
  mode: peer
  scouting:
    multicast:
      enabled: false

modules:
  - name: motor
    robots: [so101_6dof_0]
  - name: motion
    robots: [so101_6dof_0]
  - name: camera
    robots: [so101_6dof_0]
  - name: camera_decoded
    robots: [so101_6dof_0]
  - name: calibration
    robots: [so101_6dof_0]
  - name: scene3d
    robots: [so101_6dof_0]
  - name: scan
    robots: [so101_6dof_0]
  - name: bridge
