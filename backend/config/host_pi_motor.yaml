# 모터 Pi (192.168.0.101).
# 모터 제어 + 모션 계획
#
# 시작 예:
#   uv sync --only-group pi-motor
#   uv run python main.py --host pi_motor
host_name: pi_motor

zenoh:
  mode: peer
  # 같은 LAN + 멀티캐스트 정상이면 자동 발견.
  # 라우터/스위치가 멀티캐스트를 막거나 IPv6/멀티 NIC 환경이면 명시:
  connect: []
  # - "tcp/192.168.0.5:7447"    # PC
  # - "tcp/192.168.0.102:7447"  # pi-camera
  # 방화벽 룰 고정용 listen 포트 (선택):
  # listen:
  #   - "tcp/0.0.0.0:7447"

nodes:
  - motor
  - motion

bridge:
  enabled: false
