# Instance-level config — so101_6dof_0 (첫 번째 SO-101 6DOF mod 개체).
# Type-level (motor spec, joint limit) 은 robot/so101_6dof/motors.yaml.
# multi_robot_architecture.md §5.1.2 split 기준.
#
# 사용자 setup (2026-06-14): 기존 OMX 모터 Pi (host_pi_motor) 의 OpenRB-150 자리에
# Waveshare bus servo driver 연결 예정. PC 직결 X.
# Pi 가 Waveshare 인식 시 USB CDC-ACM → /dev/ttyACM0 잡힐 가능성 ↑ (OMX OpenRB 도
# 같은 자리였음). 결선 후 실측 확인 필요.
# Windows 자리는 PC 직결 시점에 갱신 — 현재는 placeholder.

motor:
  port:
    windows: "COM_NOT_USED"   # placeholder, Pi 에서만 운영 중 (host_pi_motor)
    linux: /dev/ttyACM0
  baudrate: 1000000   # 1Mbps, STS3215/3250 출하 default

# 작업 셀 ROI (base frame, m) — world_scan 포즈 겨냥 + scan mesh 크롭 + detector
# 셀 밖 컷 공통 SSOT (apps/config.py WorkcellRoi). 도달 범위 FK 로 도출한 추정치
# (2026-07-21: TCP 도달 p2~p98 X[0.01,0.32] Y[-0.29,0.26] Z[-0.04,0.24], mesh
# 실측 X≤0.35 와 정합). z_max 는 도달보다 높게 열어둠 — 핸드오버 공중 물체.
# ⚠️ 집에서 실 테이블 가장자리·핸드오버 높이 보고 숫자 보정.
workcell:
  x_min: 0.12999636636687897
  x_max: 0.36311597125775097
  y_min: -0.15684194982500987
  y_max: 0.3889580390591728
  z_min: -0.040293639593129385
  z_max: 0.22423287348490384
