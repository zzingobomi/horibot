# Mock 모드 — 하드웨어 없이 frontend UX 검증/개발용.
# 실행:
#   uv run python main.py --host mock
#
# mock_motor   → MockMotorNode  (cmd 수신 시 즉시 internal position 갱신, 20Hz state)
# mock_camera  → MockCameraNode (합성 JPEG 30fps, depth payload X)
# application 노드 (calibration / task / detector / pointcloud) 그대로 — topic 기반이라
# mock motor/camera 만 swap 하면 동일 코드 경로로 동작.
#
# robots — robots.yaml 의 enabled robot 과 일치해야 calibration_node 가 kinematics
# initialize 한 robot 으로 motion 도 동작. (host config 의 robots 와 enabled 의
# mismatch 자리에선 PybulletKinematics._require_initialized 가 fail.)
host_name: mock

zenoh:
  mode: peer
  # LAN 격리 — 같은 LAN 의 실 robot pi backend 가 떠있어도 mock 이 reach 안 함.
  # multicast 자동 발견 OFF + localhost TCP listen 만. test process 도 같은
  # endpoint 로 connect (backend/tests/conftest.py::isolated_zenoh_config).
  scouting:
    multicast:
      enabled: false
  listen: ["tcp/127.0.0.1:7447"]
  connect: []

robots:
  - so101_6dof_0

device_nodes:
  - mock_motor
  - mock_camera
  - motion

application_nodes:
  - storage
  - calibration
  - task
  - detector
  - scene3d
  - reconstruction
# gamepad — frontend UX 검증 mock 자리엔 실 펜던트 의미 X. 실 hardware 자리에만.

# In-memory backend — 매번 fresh, 영속화 X. mock 은 frontend UX 검증용이라
# 캘 데이터 누적이 의도 X. SQLite `:memory:` (RDB) + Python dict (ObjectStore).
storage:
  rdb_uri:    "sqlite:///:memory:"
  object_uri: "memory://"

bridge:
  enabled: true
  host: "0.0.0.0"
  port: 8000
