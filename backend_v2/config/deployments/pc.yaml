# 실행:
#   uv sync
#   uv run --no-sync python -m apps.main --host pc

driver_mode: real

# 공유 물리 DB (파일). 경로는 집 배포 시 조정 가능 (cwd=backend_v2 기준 상대).
rdb_uri: "sqlite:///horibot.db"
object_uri: "storage_v2/blobs"  # calibration capture blob

zenoh:
  mode: peer
  scouting:
    multicast:
      enabled: true

modules:
  - name: camera_decoded
    robots: [so101_6dof_0]
  - name: calibration # robot-agnostic (host당 1 — req.robot_id dispatch)
  - name: scene3d # robot-agnostic 라이브 pointcloud + consensus snapshot (Open3D, PC)
  - name: scan # robot-agnostic scan 세션/캡처/TSDF build (Open3D + DB owner, PC)
  - name: waypoint # robot-agnostic Robot Asset Layer — 티칭 rad + group (DB owner, PC)
  - name: bridge # HTTP/WS gateway (frontend_v2 진입점, :8000)
