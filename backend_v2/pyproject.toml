[project]
name = "horibot-backend-v2"
version = "0.1.0"
description = "Horibot Backend v2 — framework (Runtime / Contract / Mirror / Transport)"
requires-python = ">=3.11"

dependencies = [
    "eclipse-zenoh>=1.0.0",
    "pydantic>=2.9.0",
    "msgspec>=0.18.0",
]

[dependency-groups]
dev = [
    "ruff",
    "pyright",
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
]

[tool.uv]
default-groups = ["dev"]

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
asyncio_mode = "auto"

[tool.pyright]
include = ["framework", "infra", "tests"]
pythonVersion = "3.11"
