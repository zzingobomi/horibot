# so101_6dof (Feetech STS3215/STS3250, 6DOF + gripper) — Ruckig 한계 SSOT.
# TrajectoryRunner 가 moveJ / moveL / moveC / moveP 보간 시 입력으로 사용.
# 단위: SI (rad/s, rad/s², rad/s³, m/s, m/s², m/s³). dict-by-joint-name —
# motors.yaml `motors[].name` 과 일치 (gripper = joint7 은 moveJ 비대상 → 등재 X).
#
# 1차 baseline — OMX 의 운영 검증 값 (~1.5 rad/s = ~86°/s) 을 STS3215/3250 사양
# 에 맞춰 같은 비율 (sts 최대 약 45 rpm ≈ 4.7 rad/s 의 ~35%) 로 시작. 실 hardware
# 부팅 후 진동/sag 보고 튜닝.

joint_limits:
  # SpeedTcp 자리는 motors.yaml default profile 유지 (release_profile 안 호출).
  # 모터 trapezoidal profile 이 Ruckig output 부드럽게 추종 → joint jerk 적당히.
  # MoveJ/L/C/P 는 release_profile 그대로라 joint Ruckig 만 제약.
  #
  # 2026-07-09: max_velocity 1.5→1.0 rad/s (≈57°/s). 1.5(≈86°/s) 는 motors.yaml
  # 서보 profile (shoulder 60°/s, elbow 70°/s) 보다 빨라 — 궤적 峰속도 구간에서
  # 서보가 뒤처지다 감속 구간에 몰아서 따라잡는 서지("팍" 체감, PnP 접근/리프트).
  # Ruckig 상한을 가장 느린 profile(60) 아래로 → jerk-limited 곡선이 서보에서
  # 그대로 재현. 빠르게 가려면 profile 을 올리는 쪽 (motors.yaml, 후속 튜닝).
  #
  # 2026-07-17: vel 1.0→0.7 / acc 3.0→1.5 / jerk 15→8 — 전체 MoveJ(스윕/home)가
  # "급하다" 체감. 주범은 acc+jerk (0.33s 만에 풀속도 = 홱 출발). acc 절반이면
  # 램프 0.47s, 90° 이동 ~1.9s→2.7s — 차분함과 작업 속도의 절충. 체감 보고 재조정.
  joint1:
    max_velocity: 0.7
    max_acceleration: 1.5
    max_jerk: 8.0
  joint2:
    max_velocity: 0.7
    max_acceleration: 1.5
    max_jerk: 8.0
  joint3:
    max_velocity: 0.7
    max_acceleration: 1.5
    max_jerk: 8.0
  joint4:
    max_velocity: 0.7
    max_acceleration: 1.5
    max_jerk: 8.0
  joint5:
    max_velocity: 0.7
    max_acceleration: 1.5
    max_jerk: 8.0
  joint6:
    max_velocity: 0.7
    max_acceleration: 1.5
    max_jerk: 8.0

cartesian_limits:
  max_trans_vel: 0.10
  max_trans_acc: 0.3
  max_trans_jerk: 3.0
  # 6DOF 의 회전 한계 — full orientation IK 활성화 시 적용 (현재 미사용).
