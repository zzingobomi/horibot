# 실행:
#   uv sync
#   uv run --no-sync python -m apps.main --host pc

driver_mode: real

rdb_uri: "sqlite:///horibot.db"
object_uri: "storage/blobs"

dev_console: true

zenoh:
  mode: peer
  scouting:
    multicast:
      enabled: true

modules:
  - name: camera_decoded
    robots: [so101_6dof_0, omx_f_0]
  - name: calibration
  - name: scene3d
  - name: scan
  - name: waypoint
  - name: detector
  - name: llm
  - name: pick_and_place
  - name: bridge
  - name: logcollector   # 중앙 로그 수집 (log/** → debug/logs/) — PC 에만
