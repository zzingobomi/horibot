# Horibot robot instance registry.
# multi_robot_architecture.md §4.3 의 single source of truth.
# 각 entry 의 key 가 robot_id (instance identifier).
# Paths (urdf/calibration/...) 는 RobotRegistry 가 robot_type / robot_id 로 자동 조립
# — 매 entry 마다 적지 않음 (§4.3).

robots:
  omx_f_0:
    type: omx_f
    enabled: true
    host: dev              # single machine dev. 분산: pi_motor / pi_camera / pc
    motor_backend: dynamixel
    iksolver: pybullet

