# Mock 모드 — 하드웨어 없이 frontend UX 검증/개발용.
# 실행:
#   uv run python main.py --host mock
#
# mock_motor   → MockMotorNode  (cmd 수신 시 즉시 internal position 갱신, 20Hz state)
# mock_camera  → MockCameraNode (합성 JPEG 30fps, depth payload X)
# system 노드 (calibration / task / detector / pointcloud) 그대로 — topic 기반이라
# mock motor/camera 만 swap 하면 동일 코드 경로로 동작.
host_name: mock

zenoh:
  mode: peer
  connect: []

robots:
  - omx_f_0

robot_nodes:
  - mock_motor
  - mock_camera
  - motion

system_nodes:
  - calibration
  - task
  - detector
  - pointcloud

bridge:
  enabled: true
  host: "0.0.0.0"
  port: 8000
