# 실행:
#   uv sync
#   uv run --no-sync python -m apps.main --host mock

driver_mode: mock

rdb_uri: "sqlite:///:memory:"
object_uri: ".calib_blobs_mock"

# 개발용 콘솔 (GET /dev) — 프론트 없이 서비스 두드리기.
dev_console: true

zenoh:
  mode: peer
  scouting:
    multicast:
      enabled: false

modules:
  - name: motor
    robots: [so101_6dof_0, omx_f_0]
  - name: motion
    robots: [so101_6dof_0, omx_f_0]
  - name: camera
    robots: [so101_6dof_0, omx_f_0]
  - name: camera_decoded
    robots: [so101_6dof_0, omx_f_0]
  - name: calibration
  - name: scene3d
  - name: scan
  - name: waypoint
  - name: detector
  - name: llm
  - name: pick_and_place
  - name: bridge
  - name: logcollector   # 단일 머신 = 이 머신이 중앙 → 로그 파일 생성 (logs/)
  - name: host_monitor   # 이 host CPU/mem 발행 (bridge 가 집계 → 대시보드)
