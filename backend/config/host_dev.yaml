# 단일 머신 풀스택 (개발). PC 한 대가 모든 device + application 노드 다.
# 실행:
#   uv run python main.py --host dev
host_name: dev

zenoh:
  mode: peer
  # 단일 프로세스라 사실상 자기 자신만 peer. 분산 안 함.
  connect: []

robots:
  - omx_f_0

device_nodes:
  - motor
  - motion
  - camera

application_nodes:
  - storage
  - calibration
  - task
  - detector
  - scene3d
  - reconstruction
  - gamepad

# 영속성 인프라 (docs/storage_layer.md). storage_node 가 application_nodes 에
# 있을 때 필수. Path = project root (host_pc.yaml 의 설명 참조).
storage:
  rdb_uri:    "sqlite:///${PROJECT_ROOT}/storage/horibot.db"
  object_uri: "file:///${PROJECT_ROOT}/storage/blobs"

bridge:
  enabled: true
  host: "0.0.0.0"
  port: 8000
