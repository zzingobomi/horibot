# Type-level motor spec for OMX_F. 같은 type 의 모든 instance 가 공유.
# Instance-specific (USB port, baud) 는 robot/instances/<robot_id>/instance.yaml.
# multi_robot_architecture.md §5.1.2 split 기준 참조.

# Default: XL430 P=640/I=0/D=3600, XL330 P=400/I=0/D=0.

motors:
  - id: 1
    name: "joint1"
    model: "XL430-W250"
    mode: "position"
    home: 2048
    limit:
      min: 0 # -180°
      max: 4095 #  180°
    reverse: false
    pid: # base, 중력 무관
      p: 640
      i: 0
      d: 3600

  - id: 2
    name: "joint2"
    model: "XL430-W250"
    mode: "position"
    home: 2048
    limit:
      min: 1024 # -90°
      max: 3072 #  90°
    reverse: false
    pid: # shoulder, 중력 부하 큼
      p: 1500
      i: 0
      d: 3600

  - id: 3
    name: "joint3"
    model: "XL430-W250"
    mode: "position"
    home: 2048
    limit:
      min: 1024 # -90°
      max: 3072 #  90°
    reverse: false
    pid: # elbow, 중력 부하 큼
      p: 1500
      i: 0
      d: 3600

  - id: 4
    name: "joint4"
    model: "XL330-M288"
    mode: "position"
    home: 2048
    limit:
      min: 1024
      max: 3072
    reverse: false
    pid: # wrist
      p: 800
      i: 0
      d: 600

  - id: 5
    name: "joint5"
    model: "XL330-M288"
    mode: "position"
    home: 2048
    limit:
      min: 0
      max: 4095
    reverse: false
    pid: # wrist roll, D405 cantilevered 부하 댐핑 위해 D 추가
      p: 800
      i: 0
      d: 300

  - id: 6
    name: "gripper_joint_1"
    model: "XL330-M288"
    mode: "current_position"
    kind: gripper
    home: 2048
    limit:
      min: 1800
      max: 2600
    reverse: false
    pid:
      p: 800
      i: 0
      d: 0
