# Instance-level config — 이 물리 robot 개체의 specific 설정.
# Type-level (motor spec, joint limit 등) 은 robot/<robot_type>/motors.yaml.
# multi_robot_architecture.md §5.1.2 split 기준 참조.

motor:
  port:
    windows: "COM6"
    linux: /dev/ttyACM0
  baudrate: 1000000

# USB UVC 카메라 (D405 는 so101 양도 — distributed_topology.md §1).
# device_index = cv2.VideoCapture 인덱스. hori3 에 카메라 1대라 0 고정,
# /dev/video 번호 흔들리면 여기서 조정.
camera:
  device_index: 0

# 작업 셀 ROI (omx base frame, m) — detector 셀 밖 컷 + handover observe 포즈
# 겨냥(셀 centroid) 공통 SSOT. 값 근거 = offline IK 도달 특성화 (2026-07-23,
# docs/omx_handover_prep.md §8-1: z=0 도달 영역 26cm(전후)×44cm(좌우), centroid
# ≈ (0.208, 0.0)). z_max 는 도달보다 높게 열어둠 — handover 공중 물체.
# ⚠️ 집에서 실 테이블/도달 경계 보고 숫자 보정 (omx 는 depth 가 없어 스스로 못 잼
# — 이 1회 설정이 mono z=0 검출의 유일한 수작업 앵커).
workcell:
  x_min: 0.08
  x_max: 0.34
  y_min: -0.22
  y_max: 0.22
  z_min: -0.02
  z_max: 0.25
