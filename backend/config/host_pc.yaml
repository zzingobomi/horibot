# 실행:
#   uv sync
#   uv run --no-sync python main.py --host pc
host_name: pc

zenoh:
  mode: peer
  connect: []
  # - "tcp/192.168.0.101:7447"  # pi-motor
  # - "tcp/192.168.0.102:7447"  # pi-camera
  # 방화벽 룰 고정용 listen 포트 (선택):
  # listen:
  #   - "tcp/0.0.0.0:7447"

# USB 직결 robot 없음 — application 노드만
robots: []
device_nodes: []

application_nodes:
  - storage
  - calibration
  - task
  - detector
  - scene3d
  - reconstruction
  - gamepad

storage:
  rdb_uri: "sqlite:///storage/horibot.db"
  object_uri: "file:///storage/blobs"

bridge:
  enabled: true
  host: "0.0.0.0"
  port: 8000
