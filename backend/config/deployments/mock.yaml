# 실행:
#   uv sync
#   uv run --no-sync python -m apps.main --host mock

driver_mode: mock

rdb_uri: "sqlite:///:memory:"
object_uri: ".calib_blobs_mock"

# 개발용 콘솔 (GET /dev) — 프론트 없이 서비스 두드리기.
dev_console: true

zenoh:
  mode: peer
  scouting:
    multicast:
      enabled: false

modules:
  - name: motor
    robots: [so101_6dof_0, omx_f_0]
  - name: motion
    robots: [so101_6dof_0, omx_f_0]
  - name: motion_preview
  - name: camera
    robots: [so101_6dof_0, omx_f_0]
  - name: camera_decoded
    robots: [so101_6dof_0, omx_f_0]
  - name: calibration
  - name: scene3d
  - name: scan
  - name: waypoint
  # shared_config (2026-07-22 신설) — 공유 config owner (workcell ROI SSOT:
  # instance.yaml R/W + Mirror snapshot). detector 앞 = 부팅 initial snapshot
  # 즉시 수렴 (늦어도 liveliness 로 자동 수렴 — 순서는 최적화일 뿐).
  - name: shared_config
  - name: detector
  - name: llm
  - name: pick_and_place
  # world_scan (2026-07-21 신설) — 3D 배경 메시 전용 스캔 task (pick 편승 분리).
  - name: world_scan
  # handover (2026-07-17 신설, 실물 미검증) — mock 에선 활성 (터미널 실행/테스트
  # 용: scripts/run_task.py srv/handover/run). 실 배포는 pc.yaml 주석 참조.
  - name: handover
  - name: bridge
  - name: logcollector
  - name: host_monitor
