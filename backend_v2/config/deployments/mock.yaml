# 실행:
#   uv sync
#   uv run --no-sync python -m apps.main --host mock

driver_mode: mock

# mock = 하드웨어 없는 UX/wire 검증 — in-memory DB (재시작 시 휘발). 실 파일 DB 는 pc.yaml.
rdb_uri: "sqlite:///:memory:"
object_uri: ".calib_blobs_mock"  # ephemeral (gitignore) — capture blob 검증용

zenoh:
  mode: peer
  scouting:
    multicast:
      enabled: false

modules:
  - name: motor
    robots: [so101_6dof_0]
  - name: motion
    robots: [so101_6dof_0]
  - name: camera
    robots: [so101_6dof_0]
  - name: camera_decoded
    robots: [so101_6dof_0]
  - name: calibration # robot-agnostic (host당 1 — req.robot_id dispatch)
  - name: scene3d # robot-agnostic (rgbd robot 멤버십은 robots.yaml capability)
  - name: scan # robot-agnostic (session row 의 robot_id 로 파생 dispatch)
  - name: waypoint # robot-agnostic Robot Asset Layer — 티칭 joint 자세(rad) + group
  - name: detector # Detect Object (robot-agnostic, host당 1 — mock backend)
  - name: bridge
