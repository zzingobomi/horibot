# Project-wide Alembic (single DB, single migration history).
# Modules own their tables/ORM (modules/<name>/orm.py); this root Alembic manages
# the whole DB schema. NOT Database-per-Service -- same process, shared DB.
#   dev CLI:   alembic upgrade head
#   with URL:  alembic -x db_url=sqlite:///storage/horibot.db upgrade head
#   runtime:   a DB-owning module runs it programmatically via config.attributes["connection"]
# NOTE: keep this file ASCII-only. Alembic reads ini with locale encoding
# (cp949 on Windows) and non-ASCII bytes raise UnicodeDecodeError.
[alembic]
script_location = %(here)s/alembic
prepend_sys_path = .
path_separator = os
sqlalchemy.url = sqlite:///horibot.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
